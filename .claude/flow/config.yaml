# Flow Orchestrator 配置
version: "1.0"

# 激活的适配器列表（按优先级从低到高排列）
# 注释掉即禁用，切换适配器时只需修改这里
active_adapters:
  - local      # 默认本地模式
  # - tapd     # TAPD 模式（需配置 .claude/tapd-config.json）

# 事件别名（适配器无关的抽象事件名）
event_aliases:
  # 共识事件
  consensus:approved:
    local: "local:consensus-approved"
    tapd: "tapd:consensus-approved"

  consensus:rejected:
    local: "local:consensus-rejected"
    tapd: "tapd:consensus-rejected"

  # 子任务事件
  subtask:emitted:
    local: "local:subtask-emitted"
    tapd: "tapd:subtask-emitted"

  subtask:closed:
    local: "local:subtask-closed"
    tapd: "tapd:subtask-closed"

  subtask:reopened:
    local: "local:subtask-reopened"
    tapd: "tapd:subtask-reopened"

# 流程阶段定义
phases:
  # 文档阶段
  doc:
    component: doc-librarian
    description: "生成契约文档"
    on_complete:
      - event: contract:frozen
        adapters:
          - push-consensus
        next_phase: waiting-consensus

  # 等待共识阶段
  waiting-consensus:
    description: "等待 PM 评审"
    wait_for:
      - event: consensus:approved
        next_phase: planner
        message: "共识已达成，开始规划"
      - event: consensus:rejected
        next_phase: doc
        message: "PM 打回，请修订契约"

  # 规划阶段
  planner:
    component: planner
    description: "拆分任务并生成规范"
    on_complete:
      - event: planner:cases-ready
        adapters:
          - emit-subtask
        next_phase: generator

  # 生成阶段
  generator:
    component: generator
    description: "实现代码并通过测试"
    on_complete:
      - event: generator:all-done
        adapters:
          - sync-subtask
        next_phase: review

  # 评审阶段
  review:
    description: "人工评审"
    wait_for:
      - event: review:approved
        next_phase: done
        message: "评审通过，任务完成"
      - event: review:rejected
        next_phase: generator
        message: "评审打回，请修改"

  # 完成阶段
  done:
    description: "任务完成"
